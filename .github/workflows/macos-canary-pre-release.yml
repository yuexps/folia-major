name: macOS Canary Build

on:
  workflow_dispatch:

concurrency:
  group: macos-canary-pre-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS package
    runs-on: macos-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App for Electron
        env:
          ELECTRON: "true"
          APP_VERSION_LABEL: folia-macos-canary
        run: npm run build

      - name: Package Electron App for macOS
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --arm64 --publish never

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-canary-macos-latest
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 7
